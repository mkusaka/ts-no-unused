name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions: {}

env:
  # renovate: datasource=npm depName=npm versioning=npm
  NPM_VERSION: "11.16.0"

jobs:
  release:
    name: Stage npm package and create GitHub release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Validate release tag
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$ ]]; then
            echo "::error::Release tags must be full semver tags like v1.2.3 or v1.2.3-rc.0."
            exit 1
          fi

      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .node-version
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Enable Corepack
        run: corepack enable

      - name: Set up npm for staged publishing
        run: npm install -g "npm@${NPM_VERSION}"

      - name: Check npm staged publishing support
        run: |
          INSTALLED_NPM_VERSION=$(npm --version)
          echo "npm ${INSTALLED_NPM_VERSION}"
          NPM_VERSION="$INSTALLED_NPM_VERSION" node -e "const [major, minor] = process.env.NPM_VERSION.split('.').map(Number); if (major < 11 || (major === 11 && minor < 15)) { throw new Error('npm 11.15.0 or later is required for npm stage publish'); }"

      - name: Validate package version
        id: package
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_NAME=$(node -p "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).name")
          PACKAGE_VERSION=$(node -p "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).version")

          if [[ -z "$PACKAGE_NAME" || -z "$PACKAGE_VERSION" ]]; then
            echo "::error::Could not read package name/version from package.json"
            exit 1
          fi

          if [[ "$TAG_VERSION" != "$PACKAGE_VERSION" ]]; then
            echo "::error::Tag version ($TAG_VERSION) must match package.json version ($PACKAGE_VERSION)"
            exit 1
          fi

          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version >/dev/null 2>&1; then
            echo "::error::${PACKAGE_NAME}@${PACKAGE_VERSION} is already published on npm."
            exit 1
          fi

          NPM_TAG="latest"
          PRERELEASE="false"
          if [[ "$PACKAGE_VERSION" == *-* ]]; then
            PRERELEASE="true"
            PRERELEASE_ID="${PACKAGE_VERSION#*-}"
            NPM_TAG="${PRERELEASE_ID%%.*}"
          fi

          {
            echo "name=$PACKAGE_NAME"
            echo "version=$PACKAGE_VERSION"
            echo "npm_tag=$NPM_TAG"
            echo "prerelease=$PRERELEASE"
          } >> "$GITHUB_OUTPUT"

      - name: Ensure GitHub release does not already exist
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          release_draft="$(gh release view "${GITHUB_REF_NAME}" --json isDraft --jq '.isDraft' 2>/dev/null || true)"
          if [[ "$release_draft" == "false" ]]; then
            echo "::error::GitHub Release ${GITHUB_REF_NAME} already exists. Cut a new version tag."
            exit 1
          fi
          if [[ "$release_draft" == "true" ]]; then
            echo "::error::Draft GitHub Release ${GITHUB_REF_NAME} already exists. Delete it or use a new version tag."
            exit 1
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check package
        run: pnpm run check

      - name: Stage package on npm
        run: npm stage publish --access public --tag "${NPM_TAG}"
        env:
          NPM_TAG: ${{ steps.package.outputs.npm_tag }}

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          PRERELEASE: ${{ steps.package.outputs.prerelease }}
        run: |
          release_args=(
            "${GITHUB_REF_NAME}"
            --verify-tag
            --title "${GITHUB_REF_NAME}"
            --generate-notes
          )

          if [[ "$PRERELEASE" == "true" ]]; then
            release_args+=(--prerelease)
          fi

          gh release create "${release_args[@]}"

      - name: Add release summary
        env:
          PACKAGE_NAME: ${{ steps.package.outputs.name }}
          PACKAGE_VERSION: ${{ steps.package.outputs.version }}
          NPM_TAG: ${{ steps.package.outputs.npm_tag }}
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Release staged

          - GitHub Release: ${GITHUB_REF_NAME}
          - npm package: ${PACKAGE_NAME}@${PACKAGE_VERSION}
          - npm dist-tag: ${NPM_TAG}

          The npm package was submitted with \`npm stage publish\`.
          Approve the staged package on npmjs.com with 2FA to make it publicly available.
          EOF
